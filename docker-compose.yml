services:
  # ---- Postgres database ----
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: navigator
      POSTGRES_USER: navigator
      POSTGRES_PASSWORD: navigator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navigator"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Ollama ----
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-mistral nomic-embed-text}
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    command:
      - sh
      - -c
      - |
        set -e
        for model in $$OLLAMA_PULL_MODELS; do
          echo "Pulling model: $$model"
          ollama pull "$$model"
        done

  # ---- Django backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-4s#0ucylvvqnz@25y1-@b8-l#^wutb!doduq2odkl3@=iop1ja}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: navigator
      DB_USER: navigator
      DB_PASSWORD: navigator
      DB_HOST: postgres
      DB_PORT: 5432
      CORS_ALLOW_ALL: "True"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      CHROMA_PERSIST_DIR: /app/data/chroma
      RAG_QA_USE_HYBRID: ${RAG_QA_USE_HYBRID:-True}
      RAG_QA_USE_MULTI_QUERY: ${RAG_QA_USE_MULTI_QUERY:-False}
      RAG_QA_USE_RERANKING: ${RAG_QA_USE_RERANKING:-True}
      RAG_QA_TOP_K: ${RAG_QA_TOP_K:-8}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-mistral}
      RAG_LLM_NUM_PREDICT: ${RAG_LLM_NUM_PREDICT:-320}
      RAG_LLM_TEMPERATURE: ${RAG_LLM_TEMPERATURE:-0.2}
      RAG_LLM_NUM_CTX: ${RAG_LLM_NUM_CTX:-4096}
      RAG_LLM_KEEP_ALIVE: ${RAG_LLM_KEEP_ALIVE:-30m}
    volumes:
      - chroma_data:/app/data/chroma
      - media_data:/app/media
    ports:
      - "8000:8000"

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-4s#0ucylvvqnz@25y1-@b8-l#^wutb!doduq2odkl3@=iop1ja}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: navigator
      DB_USER: navigator
      DB_PASSWORD: navigator
      DB_HOST: postgres
      DB_PORT: 5432
      CORS_ALLOW_ALL: "True"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      CHROMA_PERSIST_DIR: /app/data/chroma
      RAG_QA_USE_HYBRID: ${RAG_QA_USE_HYBRID:-True}
      RAG_QA_USE_MULTI_QUERY: ${RAG_QA_USE_MULTI_QUERY:-False}
      RAG_QA_USE_RERANKING: ${RAG_QA_USE_RERANKING:-True}
      RAG_QA_TOP_K: ${RAG_QA_TOP_K:-8}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-mistral}
      RAG_LLM_NUM_PREDICT: ${RAG_LLM_NUM_PREDICT:-320}
      RAG_LLM_TEMPERATURE: ${RAG_LLM_TEMPERATURE:-0.2}
      RAG_LLM_NUM_CTX: ${RAG_LLM_NUM_CTX:-4096}
      RAG_LLM_KEEP_ALIVE: ${RAG_LLM_KEEP_ALIVE:-30m}
    volumes:
      - chroma_data:/app/data/chroma
      - media_data:/app/media
    command: ["sh", "-c", "python manage.py migrate --noinput && python manage.py process_ingestion_jobs"]

  # ---- React frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  chroma_data:
  media_data:
  ollama_data:
